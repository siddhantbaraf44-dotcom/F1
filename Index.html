<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>whatchu - Discover Movies &amp; TV</title>
<link rel="stylesheet" href="assets/css/style.css">

<!-- CRITICAL FIX: Override restrictive styles that broke scrolling & clicking -->
<style>
  /* === URGENT FIXES === */
  html, body {
    position: static !important;
    height: auto !important;
    overflow: visible !important;
    touch-action: auto !important;
  }
  
  #app {
    position: relative !important;
    height: auto !important;
    min-height: 100vh !important;
    overflow: visible !important;
  }

  .view {
    position: relative !important;
    inset: auto !important;
    height: auto !important;
    min-height: 100vh !important;
    overflow: visible !important;
    pointer-events: auto !important;
    opacity: 1 !important;
  }
  
  .scroll-view {
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch !important;
    height: auto !important;
    min-height: 100vh !important;
  }

  /* Make sure bottom nav stays on top */
  #bottom-nav {
    position: fixed !important;
    z-index: 9999 !important;
    pointer-events: auto !important;
  }
  
  .bnav-item {
    pointer-events: auto !important;
    cursor: pointer !important;
  }

  /* Fix all interactive elements */
  button, a, input, .modal-sheet, .bnav-item {
    pointer-events: auto !important;
  }

  .loading-overlay {
    pointer-events: none !important;
  }
</style>
</head>
<body>

<div id="app">
  <!-- Toast -->
  <div class="copy-toast" id="copy-toast"></div>
  
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="global-loading">
    <div class="ring"></div>
    <div class="load-text">Loading</div>
  </div>

  <!-- All Modals (same as before) -->
  <!-- PLAYLIST CREATE MODAL -->
  <div class="modal-overlay hidden" id="pl-create-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">New Playlist</div>
      <input class="modal-input" id="pl-name-input" placeholder="Playlist name..." maxlength="40" autocomplete="off" onkeydown="if(event.key==='Enter')confirmCreatePlaylist()"/>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closePlCreateModal()">Cancel</button>
        <button class="modal-confirm" onclick="confirmCreatePlaylist()">Create</button>
      </div>
    </div>
  </div>

  <!-- ADD TO PLAYLIST -->
  <div class="playlist-picker-overlay hidden" id="pl-picker-modal">
    <div class="playlist-picker-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" style="margin-bottom:12px">Add to Playlist</div>
      <div class="playlist-picker-list" id="pl-picker-list"></div>
      <button class="picker-cancel-btn" onclick="closePlPicker()">Cancel</button>
    </div>
  </div>

  <!-- CONFIRM DELETE -->
  <div class="confirm-overlay hidden" id="confirm-modal">
    <div class="confirm-box">
      <div class="confirm-icon" id="confirm-icon">🗑</div>
      <div class="confirm-title" id="confirm-title">Delete?</div>
      <div class="confirm-sub" id="confirm-sub">This cannot be undone.</div>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="closeConfirmModal()">Cancel</button>
        <button class="confirm-ok" id="confirm-ok-btn">Delete</button>
      </div>
    </div>
  </div>

  <!-- VIEWS -->
  <div id="home-view" class="view active scroll-view"></div>
  <div id="movies-view" class="view scroll-view"></div>
  <div id="search-view" class="view"></div>
  <div id="tv-view" class="view scroll-view"></div>
  <div id="mylist-view" class="view"></div>
  <div id="person-view" class="view"></div>
  <div id="detail-view" class="view"></div>
  <div id="shared-playlist-view" class="view scroll-view"></div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">
    <button class="bnav-item active" id="bnav-home" onclick="window.goHome && goHome()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </button>
    <button class="bnav-item" id="bnav-movies" onclick="window.goMovies && goMovies()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
      <span>Movies</span>
    </button>
    <button class="bnav-item" id="bnav-search" onclick="window.goSearch && goSearch()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>Search</span>
    </button>
    <button class="bnav-item" id="bnav-tv" onclick="window.goTV && goTV()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
      <span>TV Shows</span>
    </button>
    <button class="bnav-item" id="bnav-mylist" onclick="window.goMyList && goMyList()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
      <span>My List</span>
    </button>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/router.js"></script>
<script type="module" src="assets/js/app.js"></script>

<script>
  // Hide loading overlay quickly
  function forceHideLoader() {
    const loader = document.getElementById('global-loading');
    if (loader) loader.style.display = 'none';
  }
  window.addEventListener('load', () => setTimeout(forceHideLoader, 600));
  
  // Last resort: if app.js fails to attach handlers
  setTimeout(() => {
    if (!window.goHome) {
      console.log('%c[Fix] Navigation fallback enabled', 'color:#f90');
    }
  }, 3000);
</script>

</html>
